name: Sync portfolio content

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - scripts/sync-content.mjs
      - .github/workflows/sync-content.yml

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync GitHub and LinkedIn content
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          LINKEDIN_RSS_URL: ${{ secrets.LINKEDIN_RSS_URL }}
        run: node scripts/sync-content.mjs

      - name: Commit updated content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/auto-content.json
          if git diff --staged --quiet; then
            echo "No content changes to commit."
          else
            git commit -m "chore: sync GitHub projects and LinkedIn posts"
            git push
          fi
